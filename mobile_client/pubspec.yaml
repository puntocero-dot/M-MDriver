name: mm_driver
description: M&M Driver - Su conductor personal, en su propio vehículo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Sensors (telemetry)
  sensors_plus: ^5.0.1

  # Push Notifications
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4

  # WebSocket / Socket.io
  # socket_io_client is included as a first-class alternative to the manual
  # Socket.io wire-protocol implementation in driver_tracking_service.dart.
  # Uncomment to switch to the higher-level API.
  socket_io_client: ^2.0.3+1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts (Manrope headlines — Stitch design system)
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # Fonts are loaded via google_fonts package at runtime.
  # No local font files required — Manrope + Inter downloaded from Google CDN.
  # To bundle offline: download Manrope & Inter from fonts.google.com,
  # place in assets/fonts/ and re-enable declarations here.
