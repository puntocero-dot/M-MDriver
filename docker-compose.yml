services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mmdriver_postgres
    environment:
      POSTGRES_DB: mmdriver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mmdriver_dev_pass
      # DEV ONLY: trust skips password auth entirely — elimina conflictos
      # SCRAM-SHA-256 vs MD5 en entorno local. En produccion usar scram-sha-256.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5433:5432'  # 5432 ocupado por PostgreSQL nativo de Windows
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mmdriver']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mmdriver_redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mmdriver_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: mmdriver_admin
    depends_on:
      - backend
    ports:
      - '3001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api/v1
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
